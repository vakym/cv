name: Deploy CV

on:
  push:
    branches:
      - main

jobs:
  build-pdf-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # Копируем все нужные файлы в build 
      - name: Copy static files
        if: success()
        run: |
          mkdir -p build
          cp -r cv/* build/ 
      
      # Генерируем версию
      - name: Generate version
        id: version
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          VERSION="$(date +%Y.%m.%d)-${SHA_SHORT}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      # Заменяем плейсхолдер в HTML на версию
      - name: Replace version in HTML
        if: success()
        run: |
          sed -i 's/__VERSION__/${{ steps.version.outputs.VERSION }}/g' ./build/cv_now.html

       # Вставляем Id счетчика метрики
      - name: Replace version in HTML
        if: success()
        run: |
          sed -i 's/__METRIKA__/${{ secrets.METRIKA_ID }}/g' ./build/cv_now.html

      # Генерация PDF из HTML-файла
      - name: Convert HTML to PDF
        uses: fifsky/html-to-pdf-action@master
        if: success()
        with:
          htmlFile: ./build/cv_now.html
          outputFile: ./build/resume_avvakumov.pdf
          pdfOptions: '{"format": "A4", "margin": {"top": "0mm", "left": "10mm", "right": "10mm", "bottom": "0mm"}, "scale": 0.95, "displayHeaderFooter": false, "pageRanges": "1"}'
      
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Copy build to server via SFTP
        run: |
          # Диагностический batch - смотрим где мы находимся
          cat > /tmp/sftp_batch.txt << 'EOF'
          pwd
          ls -la
          cd /cv
          pwd
          ls -la
          put build/cv_now.html cv_now.html
          bye
          EOF
          
          sftp -i ~/.ssh/deploy_key \
               -P ${{ secrets.DEPLOY_PORT }} \
               -o StrictHostKeyChecking=no \
               -b /tmp/sftp_batch.txt \
               ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}
